server:
  host: 0.0.0.0
  port: 8080
  mode: debug  # debug/release

database:
  host: localhost
  port: 3306
  user: root
  password: root123
  dbname: im_db
  max_idle_conns: 10
  max_open_conns: 100

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

jwt:
  secret: your-secret-key-change-in-production
  expire_hours: 168  # 7天

websocket:
  read_buffer_size: 1024
  write_buffer_size: 1024
  max_message_size: 10240  # 10KB
  pong_wait: 60s
  write_wait: 10s

log:
  level: info         # debug/info/warn/error
  dir: ./logs         # 日志文件目录
  output: file        # 输出目标: console(仅控制台)/file(仅文件)/both(同时输出到控制台和文件)
